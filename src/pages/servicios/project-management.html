    <!-- Header Description -->
    <header class="max-w-7xl mx-auto px-4 mb-12 text-center">
        <div class="inline-flex items-center justify-center w-20 h-20 rounded-2xl bg-blue-50 text-blue-600 mb-6 shadow-sm">
            <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"></path></svg>

    <!-- Contenedor Principal de Posts (La Magia Sucede Aquí) -->
    <main class="max-w-7xl mx-auto px-4 pb-24">
        <div id="projectManagementPosts" class="space-y-12">
            <!-- Los artículos renderizados con blog-renderer.js aparecerán aquí -->
        </div>
    </main>

    <!-- Script principal para inyectar posts -->
    <script type="module">
        // Importamos la función central del "backend falso"
        import { renderPostsByCategory } from '../../js/blog-renderer.js';

        // Ejecutamos la carga para Tí
        // Nota el 'project-management' coincide con tu valor puesto en el select del admin.html
        document.addEventListener('DOMContentLoaded', () => {
             renderPostsByCategory('project-management', 'projectManagementPosts');
        });
    </script>
